<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>One Last Thing ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:linear-gradient(#05081d,#182b66);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
color:white;
overflow-y:auto;
}

.card{
background:white;
color:#333;
width:90%;
max-width:720px;
padding:40px;
border-radius:25px;
box-shadow:0 0 35px rgba(255,255,255,.2);
animation:fade .8s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

h1{
font-family:"Great Vibes",cursive;
font-size:52px;
text-align:center;
color:#ff4f95;
margin-bottom:25px;
}

p{
font-size:19px;
line-height:1.9;
text-align:center;
margin-bottom:18px;
}

.quote{
margin-top:20px;
text-align:center;
font-style:italic;
color:#888;
}

button{
margin-top:30px;
width:100%;
padding:18px;
border:none;
border-radius:40px;
background:#ff4f95;
color:white;
font-size:18px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

<h1>One Last Thing... </h1>

<p>
Before this little story comes to an end...
</p>

<p>
There's something I've wanted to say for a long time.
</p>

<p>
Not because we're missing something...
</p>

<p>
But because you deserve to hear it the way I've always imagined.
</p>

<p>
So...
turn one more page. ❤️
</p>

<div class="quote">
"Some words are worth waiting for."
</div>

<button onclick="location.href='page6.html'">
💖 One More Page
</button>

</div>

</body>
</html>
